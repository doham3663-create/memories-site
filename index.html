<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome to memories</title>
    <style>
        :root {
            --primary-gold: #FFD700;
            --primary-pink: #FF69B4;
            --primary-green: #00FF7F;
            --bg-gradient: linear-gradient(45deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: bgMove 10s ease infinite;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        @keyframes bgMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-gold), var(--primary-pink), var(--primary-green));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 2s ease-in-out infinite alternate;
            margin-bottom: 15px;
        }

        @keyframes titleGlow {
            0% { 
                filter: drop-shadow(0 0 10px var(--primary-gold));
                transform: scale(1);
            }
            100% { 
                filter: drop-shadow(0 0 25px var(--primary-pink));
                transform: scale(1.05);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .input-section {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
