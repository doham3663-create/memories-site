<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories💖</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
    min-height: 100vh;
    padding: 20px;
    color: white;
    animation: bg 8s infinite alternate;
}

@keyframes bg {
    0% {filter: hue-rotate(0deg);}
    100% {filter: hue-rotate(40deg);}
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px white;}
    to {text-shadow: 0 0 25px pink;}
}

.container {
    max-width: 600px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.memory {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    animation: zoom 0.5s ease;
}

@keyframes zoom {
    from {transform: scale(0.8);}
    to {transform: scale(1);}
}
</style>

</head>
<body>

<h1>memories💖</h1>

<div class="container">

<textarea id="text" placeholder="اكتبي الذكرى هنا..."></textarea>

<input type="file" id="image" accept="image/*">

<!-- اختيار الأغنية -->
<input type="file" id="music" accept="audio/*">

<button onclick="addMemory()">احفظ الذكرى</button>

<div id="memories"></div>

<!-- مشغل الصوت -->
<audio id="player" controls style="width:100%; margin-top:20px;"></audio>

</div>

<script>
function addMemory() {
    let text = document.getElementById("text").value;
    let file = document.getElementById("image").files[0];

    if (!text && !file) {
        alert("اكتبي حاجة أو صورة!");
        return;
    }

    let div = document.createElement("div");
    div.className = "memory";

    if (text) {
        let p = document.createElement("p");
        p.innerText = text;
        div.appendChild(p);
    }

    if (file) {
        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        div.appendChild(img);
    }

    document.getElementById("memories").appendChild(div);

    document.getElementById("text").value = "";
    document.getElementById("image").value = "";
}

// تشغيل الأغنية من الموبايل
document.getElementById("music").addEventListener("change", function(e) {
    let file = e.target.files[0];
    if (file) {
        let url = URL.createObjectURL(file);
        let player = document.getElementById("player");
        player.src = url;
        player.play();
    }
});
</script>

</body>
</html>
