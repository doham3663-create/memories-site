<!DOCTYPE html>
<html>
<head>
    <title>Memories</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;

            /* ✨ خلفية هادية ومضمونة */
            background: linear-gradient(135deg, #fafafa, #ffffff);

            background-image:
                radial-gradient(circle at 20% 20%, rgba(0,0,0,0.04), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(0,0,0,0.03), transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0,0,0,0.03), transparent 50%);

            color: #333;
        }

        /* ✨ العنوان */
        .title {
            font-size: 42px;
            color: #555;
            margin-top: 30px;
            letter-spacing: 2px;

            animation: fadeDown 1.5s ease, glow 2s infinite alternate;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #ccc;
            }
            to {
                text-shadow: 0 0 15px #aaa, 0 0 25px #ddd;
            }
        }

        /* ✨ البوكسات */
        .box {
            margin: 25px auto;
            padding: 25px;
            width: 75%;
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* ✨ textarea */
        textarea {
            width: 260px;
            height: 110px;
            padding: 12px;
            font-size: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
        }

        /* ✨ buttons */
        button {
            padding: 10px 22px;
            font-size: 15px;
            border: none;
            border-radius: 10px;
            background: #777;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #555;
            transform: scale(1.05);
        }

        /* ✨ message */
        #message {
            font-size: 18px;
            color: #333;
            transition: 0.5s;
        }

        /* ✨ slideshow */
        .slideshow {
            width: 320px;
            height: 320px;
            margin: auto;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            position: relative;
        }
