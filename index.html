<!DOCTYPE html>
<html>
<head>
    <title>Memories</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;

            /* ✨ الخلفية الجديدة الهادية */
            background: linear-gradient(135deg, #f7f7f7, #ffffff);

            background-image:
                radial-gradient(circle at 20% 20%, rgba(200,200,200,0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(220,220,220,0.2) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(210,210,210,0.15) 0%, transparent 50%);
        }

        /* ✨ عنوان MEMORIES */
        .title {
            color: gray;
            font-size: 40px;
            margin-top: 30px;
            animation: fadeDown 1.5s ease-in-out, glow 2s infinite alternate;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #ccc;
            }
            to {
                text-shadow: 0 0 15px #aaa, 0 0 25px #ddd;
            }
        }

        /* Start Screen */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #startScreen h2 {
            color: gray;
            margin-bottom: 20px;
        }

        #startScreen button {
            padding: 12px 25px;
            font-size: 18px;
            background: gray;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Boxes (paper effect) */
        .box {
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .box::before {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            right: -6px;
            bottom: -6px;
            background: #f9f9f9;
            border-radius: 12px;
            z-index: -1;
        }

        textarea {
            width: 250px;
            height: 120px;
            padding: 10px;
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: gray;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #555;
        }

        #message {
            font-size: 18px;
            color: #333;
            transition: opacity 0.8s ease-in-out;
        }

        /* Slideshow */
        .slideshow {
            position: relative;
            width: 300px;
            height: 300px;
            margin: auto;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        #overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
    </style>
</head>
