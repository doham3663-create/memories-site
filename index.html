<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
    color: #5a3e2b;
}

/* فيديو الخلفية */
#bgVideo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* طبقة لون */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(245, 230, 211, 0.7);
    z-index: -1;
}

/* رفع الملفات */
.controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

/* الصور */
.slide {
    position: absolute;
    width: 70%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
    border-radius: 20px;
    transition: 2s;
}

/* الصورة النشطة */
.slide.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
}

/* بوكس الكتابة */
#mainText {
    width: 250px;
    height: 80px;
    border-radius: 15px;
    border: none;
    padding: 10px;
    background: #fff8f0;
    color: #5a3e2b;
    margin-top: 5px;
}

/* زرار */
button {
    background: #8b5e3c;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 10px;
    cursor: pointer;
}

/* عرض النص */
#mainDisplay {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    font-size: 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: 1.5s;
}

#mainDisplay.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop></video>
<div class="overlay"></div>

<div class="controls">
    <input type="file" accept="video/*" onchange="loadVideo(event)"><br>
    <input type="file" accept="audio/*" onchange="loadAudio(event)"><br>
    <input type="file" accept="image/*" multiple onchange="loadImages(event)"><br><br>

    <textarea id="mainText" placeholder="اكتبي ذكريتك هنا..."></textarea><br>
    <button onclick="showMainText()">عرض الذكرى</button>
</div>

<div id="mainDisplay"></div>

<audio id="audio" loop></audio>

<script>
let slides = [];
let index = 0;

// فيديو
function loadVideo(e){
    bgVideo.src = URL.createObjectURL(e.target.files[0]);
}

// صوت
function loadAudio(e){
    audio.src = URL.createObjectURL(e.target.files[0]);
    audio.play();
}

// صور
function loadImages(e){
    slides.forEach(s => s.remove());
    slides = [];

    Array.from(e.target.files).forEach(file => {
        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        img.className = "slide";
        document.body.appendChild(img);
        slides.push(img);
    });

    startShow();
}

// عرض الصور
function startShow(){
    if(slides.length === 0) return;

    setInterval(() => {
        slides.forEach(s => s.classList.remove("active"));

        slides[index].classList.add("active");

        index++;
        if(index >= slides.length) index = 0;

    }, 3000);
}

// عرض الذكرى
function showMainText() {
    let text = document.getElementById("mainText").value;
    let display = document.getElementById("mainDisplay");

    display.innerText = text;
    display.classList.add("show");
}
</script>

</body>
</html>
