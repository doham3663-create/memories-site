<!DOCTYPE html>
<html>
<head>
    <title>Memories</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #ffffff;
            background-image: linear-gradient(0deg, #eaeaea 1px, transparent 1px),
                              linear-gradient(90deg, #eaeaea 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* ✨ عنوان MEMORIES */
        .title {
            color: gray;
            font-size: 40px;
            margin-top: 30px;

            animation: fadeDown 1.5s ease-in-out, glow 2s infinite alternate;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #ccc;
            }
            to {
                text-shadow: 0 0 15px #aaa, 0 0 25px #ddd;
            }
        }

        /* Start Screen */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #startScreen h2 {
            color: gray;
            margin-bottom: 20px;
        }

        #startScreen button {
            padding: 12px 25px;
            font-size: 18px;
            background: gray;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Boxes (Paper effect) */
        .box {
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .box::before {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            right: -6px;
            bottom: -6px;
            background: #f9f9f9;
            border-radius: 12px;
            z-index: -1;
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: gray;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #555;
        }

        #message {
            font-size: 18px;
            color: #333;
            transition: opacity 0.8s ease-in-out;
        }

        /* Slideshow */
        .slideshow {
            position: relative;
            width: 300px;
            height: 300px;
            margin: auto;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        #overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🎵 موسيقى -->
<iframe
    width="0"
    height="0"
    src="https://www.youtube.com/embed/PX2d9J5b8dc?autoplay=1&loop=1&playlist=PX2d9J5b8dc"
    frameborder="0"
    allow="autoplay">
</iframe>

<!-- Start Screen -->
<div id="startScreen">
    <h2>Welcome to Memories 🤍</h2>
    <button onclick="startSite()">Start Memories</button>
</div>

<h1 class="title">MEMORIES 🤍</h1>

<!-- مسدج -->
<div class="box">
    <textarea placeholder="اكتبي مسدج هنا 💌"></textarea>
</div>

<!-- جمل -->
<div class="box">
    <button onclick="showMessage()">Next Memory</button>
    <p id="message"></p>
</div>

<!-- صور (Slideshow) -->
<div class="box">
    <h3>Memories Photos 📸</h3>

    <div class="slideshow">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
        <img class="slide" src="https://via.placeholder.com/300">
    </div>
</div>

<!-- تكبير الصورة -->
<div id="overlay" onclick="closeImage()">
    <img id="bigImg">
</div>

<script>
    // Start site
    function startSite() {
        document.getElementById("startScreen").style.display = "none";
    }

    // Messages
    let messages = [
        "اكتبي الجملة 1 هنا",
        "اكتبي الجملة 2 هنا",
        "اكتبي الجملة 3 هنا",
        "اكتبي الجملة 4 هنا",
        "اكتبي الجملة 5 هنا",
        "اكتبي الجملة 6 هنا",
        "اكتبي الجملة 7 هنا",
        "اكتبي الجملة 8 هنا",
        "اكتبي الجملة 9 هنا",
        "اكتبي الجملة 10 هنا"
    ];

    function showMessage() {
        let random = Math.floor(Math.random() * messages.length);

        let msg = document.getElementById("message");
        msg.style.opacity = 0;

        setTimeout(() => {
            msg.innerText = messages[random];
            msg.style.opacity = 1;
        }, 300);
    }

    // Slideshow
    let index = 0;
    let slides = document.getElementsByClassName("slide");

    function showSlides() {
        for (let i = 0; i < slides.length; i++) {
            slides[i].style.opacity = 0;
        }

        index++;
        if (index > slides.length) index = 1;

        slides[index - 1].style.opacity = 1;

        setTimeout(showSlides, 2000);
    }

    showSlides();

    // Overlay
    function openImage(el) {
        let imgSrc = el.querySelector("img").src;
        document.getElementById("bigImg").src = imgSrc;
        document.getElementById("overlay").style.display = "flex";
    }

    function closeImage() {
        document.getElementById("overlay").style.display = "none";
    }
</script>

</body>
</html>
