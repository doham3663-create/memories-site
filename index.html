<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memories 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
    color: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

/* الإدخالات */
input, textarea, button {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

button {
    background: black;
    color: white;
}

/* السلايدر */
.slider {
    max-width: 600px;
    margin: 20px auto;
    overflow: hidden;
    border-radius: 15px;
    display: none;
}

.slides {
    display: flex;
    transition: 0.5s ease;
}

.slide {
    min-width: 100%;
    background: white;
    color: black;
    text-align: center;
    padding: 10px;
}

.slide img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>memories 💖</h1>

<!-- ⭐ أول حاجة: بوكس الكتابة -->
<p>💌 اكتبي الذكرى الأساسية</p>
<textarea id="mainText" placeholder="اكتبي إحساسك هنا..."></textarea>

<p>📸 اختاري صور (10 على الأقل)</p>
<input type="file" id="images" multiple accept="image/*">

<p>🎧 موسيقى</p>
<input type="file" id="music" accept="audio/*">

<button onclick="start()">ابدأ الذكريات</button>

<audio id="player" controls></audio>

<div class="slider" id="slider">
    <div class="slides" id="slides"></div>
</div>

<script>

let data = [];

/* الموسيقى */
document.getElementById("music").addEventListener("change", function(e){
    let file = e.target.files[0];
    if(file){
        document.getElementById("player").src = URL.createObjectURL(file);
    }
});

/* البداية */
function start(){

    let mainText = document.getElementById("mainText").value;
    let files = document.getElementById("images").files;

    if(!mainText){
        alert("اكتبي الذكرى الأول!");
        return;
    }

    if(files.length < 10){
        alert("لازم 10 صور على الأقل!");
        return;
    }

    data = [];

    for(let i = 0; i < files.length; i++){

        let quote = prompt("✨ اكتبي جملة تحفيزية للصورة " + (i+1));

        data.push({
            img: URL.createObjectURL(files[i]),
            message: mainText,
            quote: quote || ""
        });
    }

    render();
}

/* عرض */
function render(){
    let slides = document.getElementById("slides");
    slides.innerHTML = "";

    data.forEach(item => {
        let div = document.createElement("div");
        div.className = "slide";

        div.innerHTML = `
            <img src="${item.img}">
            <p>💌 ${item.message}</p>
            <em>✨ ${item.quote}</em>
        `;

        slides.appendChild(div);
    });

    document.getElementById("slider").style.display = "block";
}

</script>

</body>
</html>
